<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.tailwindcss.com"></script>
         <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gradient-to-r from-lime-500 via-green-500 to-emerald-500 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-4xl px-6">
        <div class="relative mx-auto bg-gray-800 rounded-3xl shadow-2xl overflow-visible" style="height:520px;">
            <div class="absolute inset-6 rounded-2xl bg-slate-900/95 overflow-hidden flex">
                <div class="w-1/2 relative p-8 text-white">
                    <div class="absolute left-8 top-8 flex items-center space-x-4">
                        <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center">
                           <img src="https://thumbs.dreamstime.com/b/chef-logo-design-restaurant-logo-chef-logo-design-restaurant-logo-388317875.jpg"
                           alt="Chef Logo"
                           class="w-17 h-26 rounded-full">
                        </div> 
                        <div>
                            <div class="text-xl font-semibold">Bungbang Restaurant</div>
                            <div class="text-sm text-white/70">Health is wealth</div>
                        </div>
                    </div>
                    <div class="h-full flex items-center justify-center">
                        <div class="max-w-xs text-white/80">
                            <h2 class="bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-600 text-white font-bold text-2xl rounded-3xl text-center p-3 mb-2 shadow-lg"> Welcome to our BungBang Restaurant</h2>
    
                            <p class=" flex text-2xl justify-center">
                                Ayben ar Khaiben
                            </p>
                        </div>
                    </div>
                </div>
                <div class="w-1/2 flex items-center justify-center">
                    <div class="bg-white rounded-lg shadow-lg w-80 p-6 mr-8">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-semibold">Admin / Employee</h3>
                            <div class="text-sm text-gray-500">Login</div>
                        </div>
                        <div class="mb-4">
                            
                        </div>
                        <form>
                            <label class="block text-xs text-gray-600 mb-1 ">Email</label>
                            <input type="email" class="w-full mb-3 px-3 py-2 border rounded-md text-sm" placeholder="1234@gmail.com"/>
                            <label class="block text-xs text-gray-600 mb-1">Password</label>
                            <input type="password" class="w-full mb-4 px-3 py-2 border rounded-md text-sm" placeholder="••••••••" />
                            <button type="submit" class="w-full bg-sky-600 text-white py-2 rounded-md font-medium">Log in</button>
                        </form>
                        <div class="text-center text-xs text-gray-500 mt-3">
                            <a href="#" class="underline hover:text-indigo-300">Forgot password?</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="absolute left-1/2 transform -translate-x-1/2 bottom-4 w-48 h-6 bg-gray-700 rounded-md"></div>
            <div class="absolute left-1/2 transform -translate-x-1/2 bottom-0 w-24 h-4 bg-gray-600 rounded-sm"></div>
        </div>
    </div>

</body>
</html>
