<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BungBang Restaurant</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-900 via-[#0f172a] to-black min-h-screen flex items-center justify-center">

    <div class="w-full max-w-4xl px-6">

        <div class="relative mx-auto bg-[#162033] rounded-3xl shadow-[0_25px_80px_rgba(0,0,0,0.5)] overflow-hidden"
             style="height:520px;">

            <div class="absolute inset-6 rounded-2xl bg-[#0b1220] overflow-hidden flex">

                <div class="w-1/2 relative p-8 text-white bg-gradient-to-br from-emerald-700 via-emerald-800 to-[#064e3b]">

                    <div class="absolute left-8 top-8 flex items-center gap-4">

                        <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center shadow-lg border-2 border-amber-400">

                            <img
                                src="https://thumbs.dreamstime.com/b/chef-logo-design-restaurant-logo-chef-logo-design-restaurant-logo-388317875.jpg"
                                alt="Chef Logo"
                                class="w-14 h-14 rounded-full object-cover">

                        </div>

                        <div>

                            <div class="text-2xl font-bold tracking-wide text-amber-300">
                                BungBang Restaurant
                            </div>

                            <div class="text-sm text-emerald-100">
                                Health is Wealth
                            </div>

                        </div>

                    </div>

                    <div class="h-full flex items-center justify-center">

                        <div class="max-w-xs">

                            <h2 class="bg-white text-slate-800 font-bold text-2xl rounded-2xl text-center p-4 mb-4 shadow-xl">

                                Welcome to our BungBang Restaurant

                            </h2>

                            <p class="text-center text-xl text-amber-100 font-medium">
                                Ayben ar Khaiben
                            </p>

                        </div>

                    </div>

                </div>

                <div class="w-1/2 flex items-center justify-center bg-[#f8fafc]">

                    <div class="bg-white rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.15)] w-80 p-6 border border-slate-200">

                        <div class="flex justify-between items-center mb-5">

                            <h3 class="text-lg font-bold text-slate-800">
                                Admin / Employee
                            </h3>

                            <div class="text-sm text-slate-500">
                                Login
                            </div>

                        </div>

                        <form>

                            <label class="block text-xs font-medium text-slate-600 mb-1">
                                Email
                            </label>

                            <input
                                type="email"
                                placeholder="1234@gmail.com"
                                class="w-full mb-4 px-4 py-2.5 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400">

                            <label class="block text-xs font-medium text-slate-600 mb-1">
                                Password
                            </label>

                            <input
                                type="password"
                                placeholder="••••••••"
                                class="w-full mb-4 px-4 py-2.5 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400">

                            <button
                                type="submit"
                                class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white py-2.5 rounded-lg font-medium transition-all duration-300 shadow-lg">

                                Log In

                            </button>

                        </form>

                        <div class="text-center text-xs mt-4">

                            <a href="#"
                               class="underline text-slate-500 hover:text-amber-500 transition">

                                Forgot Password?

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
