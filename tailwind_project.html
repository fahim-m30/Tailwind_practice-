<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Lock Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex justify-center items-center min-h-screen">

    <div class="w-[900px] h-[600px] bg-black rounded-[40px] p-4">
        
        <div class="relative w-full h-full rounded-[30px] overflow-hidden text-white">

            <!-- Background -->
            <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-cyan-300 to-teal-400"></div>

            <div class="absolute -top-20 -left-20 w-[500px] h-[350px] bg-blue-800 rounded-full opacity-70"></div>

            <div class="absolute top-20 right-[-120px] w-[500px] h-[500px] bg-teal-200 rounded-full opacity-60"></div>

            <div class="absolute bottom-[-150px] left-40 w-[700px] h-[300px] bg-cyan-500 rounded-full opacity-50"></div>

            <!-- Main Content -->
            <div class="relative z-10 h-full flex flex-col justify-between p-10">

                <!-- Top Section -->
                <div class="flex justify-between items-start">

                    <!-- Left -->
                    <div>
                        <p class="text-3xl">Mon Jun</p>
                        <h1 class="text-8xl font-bold">1</h1>
                    </div>

                    <!-- Center -->
                    <div class="text-center">
                        <p class="text-lg">
                            Mon 5 ⛅ Cupertino
                        </p>

                        <h1 class="text-8xl font-bold">
                            9:41
                        </h1>
                    </div>

                    <!-- Empty Space -->
                    <div class="w-32"></div>

                </div>

                <!-- Bottom Widgets -->
                <div class="flex gap-10 items-end">

                    <!-- Schedule -->
                    <div>
                        <p>11:30AM - 12:30PM</p>
                        <p class="font-semibold">Design Review</p>
                        <p>Conference Room</p>
                    </div>

                    <!-- Weather -->
                    <div>
                        <p class="text-3xl font-bold">67°</p>
                        <p>50° 75°</p>
                    </div>

                    <!-- AQI -->
                    <div>
                        <p class="text-3xl font-bold">27</p>
                        <p>AQI</p>
                    </div>

                    <!-- Stock -->
                    <div>
                        <p>📈 AAPL +1.78</p>
                        <div class="w-32 h-10 border-b border-white"></div>
                    </div>

                    <!-- Clock -->
                    <div class="w-24 h-24 rounded-full border-4 border-white flex items-center justify-center text-4xl">
                        🕘
                    </div>

                    <!-- City Time -->
                    <div>
                        <p>Cupertino</p>
                        <p class="text-4xl">9:41 AM</p>
                    </div>

                </div>

                <!-- Home Indicator -->
                <div class="flex justify-center">
                    <div class="w-36 h-1 bg-white rounded-full"></div>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
